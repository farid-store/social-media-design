<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Grid Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        canvas { 
            border: 1px solid #e5e7eb; 
            max-width: 100%; 
            height: auto;
            background-color: white;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-gray-800">Grid Designer</h1>
            <p class="text-gray-500">Buat desain 3 deret kotak Instagram yang rapi dan profesional.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-5">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Warna Latar</label>
                    <input type="color" id="bgColor" value="#ffffff" class="w-full h-10 rounded cursor-pointer">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Gambar</label>
                    <input type="file" id="imageUpload" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <div class="border-t pt-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tambahkan Teks</label>
                    <input type="text" id="textInput" placeholder="Masukkan teks..." class="w-full p-2 border rounded-md mb-2 text-sm">
                    <div class="flex gap-2">
                        <input type="color" id="textColor" value="#000000" class="w-10 h-10 rounded cursor-pointer">
                        <button id="addTextBtn" class="flex-1 bg-gray-900 text-white rounded-md text-sm font-semibold hover:bg-gray-800 transition">Tambah Teks</button>
                    </div>
                </div>

                <button id="clearBtn" class="mt-auto pt-4 text-red-500 text-sm font-semibold hover:underline text-left">Hapus Semua</button>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 overflow-x-auto relative">
                    <canvas id="designCanvas" width="3240" height="1080"></canvas>
                </div>
                <p class="text-xs text-gray-400 mt-3 text-center">Garis merah putus-putus adalah batas perpotongan tiap *slide* Instagram.</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('designCanvas');
        const ctx = canvas.getContext('2d');
        let elements = []; // Menyimpan gambar dan teks yang ditambahkan

        // Set background awal
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        // 1. Mengubah Warna Background
        document.getElementById('bgColor').addEventListener('input', (e) => {
            redrawCanvas();
        });

        // 2. Upload Gambar
        document.getElementById('imageUpload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = function(event){
                const img = new Image();
                img.onload = function(){
                    elements.push({ type: 'image', img: img, x: canvas.width/2 - img.width/2, y: canvas.height/2 - img.height/2 });
                    redrawCanvas();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // 3. Tambah Teks
        document.getElementById('addTextBtn').addEventListener('click', () => {
            const text = document.getElementById('textInput').value;
            const color = document.getElementById('textColor').value;
            if(text) {
                elements.push({ type: 'text', content: text, color: color, x: 100, y: 200, font: 'bold 80px Inter' });
                redrawCanvas();
            }
        });

        // 4. Reset
        document.getElementById('clearBtn').addEventListener('click', () => {
            elements = [];
            redrawCanvas();
        });

        // Fungsi menggambar ulang semua elemen agar tidak tumpang tindih berantakan
        function redrawCanvas() {
            // Gambar Background
            ctx.fillStyle = document.getElementById('bgColor').value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Render Elemen (Gambar & Teks)
            elements.forEach(el => {
                if(el.type === 'image') {
                    ctx.drawImage(el.img, el.x, el.y);
                } else if(el.type === 'text') {
                    ctx.font = el.font;
                    ctx.fillStyle = el.color;
                    ctx.fillText(el.content, el.x, el.y);
                }
            });

            // Gambar Garis Pembantu (Grid)
            drawGrid();
        }

        function drawGrid() {
            ctx.beginPath();
            ctx.setLineDash([20, 20]);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#ef4444'; // Merah
            // Garis pembatas 1
            ctx.moveTo(1080, 0); ctx.lineTo(1080, 1080);
            // Garis pembatas 2
            ctx.moveTo(2160, 0); ctx.lineTo(2160, 1080);
            ctx.stroke();
            ctx.setLineDash([]); // Reset line dash
        }

        // Catatan: Script ini adalah versi dasar statis. Untuk membuat objek bisa di-drag-and-drop, 
        // disarankan mengintegrasikan library seperti Fabric.js di pengembangan tahap selanjutnya.
    </script>
</body>
</html>
